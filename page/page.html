<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animalist | Search</title>

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {} } };
    </script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="overflow-x: hidden;">

    <!-- ═══ NAVIGATION / SEARCH BAR ═══ -->
    <header class="search-navbar">
      <div class="search-nav-inner">

        <!-- Logo -->
        <a href="../index.html" class="nav-logo">
          <div>
            <span class="nav-logo-text">Animalist</span>
            <span class="nav-logo-sub">Your best choice</span>
          </div>
        </a>

        <!-- Search Form -->
        <form class="search-form" action="" autocomplete="on">
          <div class="search-input-wrapper">
            <!-- Search icon -->
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>

            <input
              autofocus
              required
              pattern="[a-zA-Z\d\s:!.]{1,}"
              oninvalid="this.setCustomValidity('No symbols allowed!')"
              onchange="this.setCustomValidity('')"
              placeholder="Search anime, manga, characters..."
              type="text"
              class="search-input"
            />

            <button id="submitbtn" type="button" class="search-btn">
              Search
            </button>
          </div>
        </form>

      </div>
    </header>
    <!-- ═══ /NAVIGATION ═══ -->

    <!-- Loading indicator -->
    <div id="loading" class="loading-state">
      <div class="loading-ring"></div>
      <p class="loading-text">Searching the anime universe...</p>
    </div>

    <!-- ═══ ANIME RESULTS ═══ -->
    <div class="results-section-header" id="headerAnime">
      <h1 id="txtAnime" class="results-section-title" style="font-family: 'Freckle Face'">Anime</h1>
      <div class="results-section-line"></div>
    </div>
    <section id="sectionAnime" class="results-section"></section>
    <!-- ═══ /ANIME ═══ -->

    <!-- ═══ MANGA RESULTS ═══ -->
    <div class="results-section-header" id="headerManga">
      <h1 id="txtManga" class="results-section-title" style="font-family: 'Freckle Face'">Manga</h1>
      <div class="results-section-line"></div>
    </div>
    <section id="sectionManga" class="results-section"></section>
    <!-- ═══ /MANGA ═══ -->

    <!-- ═══ CHARACTER RESULTS ═══ -->
    <div class="results-section-header" id="headerChar">
      <h1 id="txtChar" class="results-section-title" style="font-family: 'Freckle Face'">Characters</h1>
      <div class="results-section-line"></div>
    </div>
    <section id="sectionChar" class="results-section"></section>
    <!-- ═══ /CHARACTERS ═══ -->

    <!-- Scroll buttons -->
    <a id="toTop" href="#" class="fixed top-36 left-1/2 hidden h-fit z-50" style="transform: translate(-50%,0);">
      <div style="background-image:url('../img/scrolldown.png');width:2em;height:2em" class="rotate-180 m-auto bg-cover bg-center cursor-pointer hover:scale-105 hover:opacity-90 transition"></div>
    </a>
    <a id="toBottom" href="#end" class="fixed bottom-10 left-1/2 h-fit hidden z-50" style="transform: translate(-50%,0);">
      <div style="background-image:url('../img/scrolldown.png');width:2em;height:2em" class="m-auto bg-cover bg-center cursor-pointer hover:scale-105 hover:opacity-90 transition"></div>
    </a>

    <div id="end" class="scroll-smooth" style="padding-bottom: 4rem;"></div>

    <script src="script.js"></script>
  </body>
</html>
